name: rpm

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            git rust cargo cmake gcc-c++ pkgconf-pkg-config mold \
            qt6-qtbase-devel qt6-qtdeclarative-devel qt6-qtsvg-devel qt6-qtshadertools \
            systemd-devel openssl-devel protobuf-compiler
          cargo install cargo-generate-rpm
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4

      - name: Build release binary
        run: cargo build --release --target-dir target-fedora

      - name: Stage packaging icon
        run: cp crates/omikuji/qml/icons/app.png packaging/io.github.reakjra.omikuji.png

      - name: Build rpm
        run: cargo generate-rpm -p crates/omikuji -o omikuji.rpm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omikuji-rpm
          path: omikuji.rpm

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: omikuji.rpm
